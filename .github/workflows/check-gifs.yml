name: gif-rule

# Règle : un GIF de démo par composant (docs/<composant>.gif), référencé
# dans le README. Bloque la PR / le push si ce n'est pas le cas.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Vérifie qu'un GIF de démo existe pour chaque composant
        run: node scripts/check-component-gifs.mjs
